<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020711" />
  <meta name="color-scheme" content="dark" />
  <title>My Forever World</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="experience" aria-label="A cinematic animated love story">
    <canvas id="world" aria-hidden="true"></canvas>

    <section id="startScreen" class="start-screen">
      <div class="start-card">
        <p class="eyebrow">A SMALL WORLD MADE FOR YOU</p>
        <h1>My Forever World</h1>
        <p class="intro-copy">One small kiss. One impossible ocean. A world waiting below.</p>
        <button id="startButton" type="button">Enter the world</button>
        <p class="hint">Best viewed vertically</p>
      </div>
    </section>

    <div class="top-bar" aria-hidden="true">
      <span id="sceneLabel">THE ICE</span>
      <span id="timeLabel">00:00</span>
    </div>

    <div class="controls" aria-label="Animation controls">
      <button id="pauseButton" type="button" aria-label="Pause animation">Pause</button>
      <button id="restartButton" type="button" aria-label="Restart animation">Restart</button>
    </div>

    <div class="progress-track" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <p class="reduced-motion-note" id="reducedMotionNote" hidden>
      Reduced motion is enabled on this device, so transitions are softened.
    </p>
  </main>

  <script type="module" src="animation.js"></script>
</body>
</html>

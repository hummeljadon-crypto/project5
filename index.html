<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030813" />
  <meta name="color-scheme" content="dark" />
  <title>Forever World — Icefall</title>
  <meta name="description" content="A mobile-first cinematic iceberg animation." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app" aria-label="Forever World animation">
    <canvas id="scene" aria-label="Animated iceberg scene"></canvas>

    <section class="intro" id="intro">
      <div class="intro__card">
        <p class="intro__eyebrow">FOREVER WORLD</p>
        <h1>Icefall</h1>
        <p>Tap to enter.</p>
        <button id="startButton" type="button">Begin</button>
      </div>
    </section>

    <section class="player" aria-label="Animation controls">
      <div class="player__row">
        <button id="playPauseButton" type="button" aria-label="Pause animation">Pause</button>
        <span id="timeReadout">0:00</span>
        <button id="restartButton" type="button">Restart</button>
      </div>
      <input id="timeline" type="range" min="0" max="138" step="0.01" value="0" aria-label="Animation timeline" />
    </section>
  </main>

  <script src="./animation.js"></script>
</body>
</html>

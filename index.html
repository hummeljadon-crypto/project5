<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"
  />
  <title>Forever World — Scene 1</title>
  <meta
    name="description"
    content="A mobile-first cinematic animation scene built for GitHub Pages."
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <canvas id="scene"></canvas>

    <div class="hud">
      <div class="topbar">
        <div class="pill">Scene 1 — Ice / Whale / Eye</div>
        <div class="pill" id="timeLabel">0:00 / 2:13</div>
      </div>

      <div class="controls">
        <button id="playBtn" class="ctrl">Play</button>
        <button id="pauseBtn" class="ctrl">Pause</button>
        <button id="restartBtn" class="ctrl">Restart</button>
      </div>

      <div class="scrub-wrap">
        <input id="scrub" type="range" min="0" max="133" step="0.01" value="0" />
      </div>
    </div>

    <div class="intro" id="intro">
      <div class="intro-card">
        <p class="eyebrow">Forever World</p>
        <h1>Scene 1</h1>
        <p class="desc">
          Tap to begin the animation.<br />
          No audio yet — we’re locking the visuals first.
        </p>
        <button id="startBtn" class="start-btn">Start</button>
      </div>
    </div>
  </main>

  <script src="./animation.js"></script>
</body>
</html>

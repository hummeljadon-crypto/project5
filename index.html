<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#02050a" />
  <title>Forever World</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="stage" id="stage">
    <canvas id="scene" aria-label="Forever World cinematic animation"></canvas>

    <section class="intro" id="intro">
      <div class="intro__card">
        <p class="intro__eyebrow">Forever World</p>
        <h1>Scene One</h1>
        <p>Animation-only director cut.</p>
        <button id="startButton" type="button">Begin</button>
      </div>
    </section>

    <section class="player" aria-label="Animation controls">
      <div class="player__row">
        <button id="playPauseButton" type="button" aria-label="Play animation">Play</button>
        <button id="restartButton" type="button">Restart</button>
        <output id="timeReadout">0:00 / 2:44</output>
      </div>
      <input id="timeline" type="range" min="0" max="164" step="0.01" value="0" aria-label="Animation timeline" />
    </section>
  </main>

  <script src="./animation.js"></script>
</body>
</html>
